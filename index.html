<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Early fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          console.log('Fetch descriptor:', descriptor);
          if (descriptor && !descriptor.writable && descriptor.configurable) {
            console.log('Patching fetch to be writable...');
            Object.defineProperty(window, 'fetch', {
              value: window.fetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          } else if (descriptor && !descriptor.configurable) {
            console.warn('Fetch is NOT configurable. Cannot patch.');
          }
        } catch (e) {
          console.error('Error patching fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
